<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer 3D | ADN</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body{margin:0;font-family:Inter,Arial,sans-serif;background:#07111f;color:#f8fafc}
    .wrap{width:min(1200px,calc(100% - 32px));margin:0 auto;padding:28px 0}
    .hero{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:center}
    .panel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:20px}
    model-viewer{width:100%;height:70vh;border-radius:22px;background:linear-gradient(180deg,#0f172a,#111827)}
    .btn{display:inline-flex;text-decoration:none;background:#22d3ee;color:#082f49;padding:12px 16px;border-radius:16px;font-weight:800}
    @media (max-width:760px){.hero{grid-template-columns:1fr} model-viewer{height:54vh}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="panel">
        <p style="margin:0 0 8px;color:#22d3ee;font-weight:800;text-transform:uppercase;letter-spacing:.18em">Viewer 3D</p>
        <h1>ADN en 3D</h1>
        <p>Esta vista permite girar, acercar y observar una doble hélice de ADN. Sirve para reforzar la idea de evidencia molecular y material genético.</p>
        <ul>
          <li>Girar el modelo</li>
          <li>Hacer zoom</li>
          <li>Relacionar forma y función</li>
        </ul>
        <a class="btn" href="../index.html#xr">← Volver al sitio</a>
      </div>
      <div class="panel">
        <model-viewer src="https://modelviewer.dev/shared-assets/models/DNA.glb" camera-controls auto-rotate ar alt="Modelo 3D de ADN"></model-viewer>
      </div>
    </div>
  </div>
</body>
</html>
